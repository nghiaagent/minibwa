name: Build and Release Containers
on:
  push:
    branches:
      - master
permissions:
  contents: write
  packages: write
jobs:
  build-release-containers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract version
        id: get_version
        run: |
          # Extract version from minibwa.h (e.g. 0.3)
          VERSION=$(grep '#define MB_VERSION' minibwa.h | cut -d '"' -f 2 | sed 's/-dirty//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/minibwa:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/minibwa:latest
      - name: Set up Apptainer
        uses: eWaterCycle/setup-apptainer@v2
        with:
          apptainer-version: 1.3.6
      - name: Build Singularity SIF Image
        run: |
          apptainer build minibwa.sif Singularity.def
      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}-build${{ github.run_number }}
          name: Release v${{ steps.get_version.outputs.VERSION }} (Build #${{ github.run_number }})
          body: |
            Automated container build for `minibwa` ${{ steps.get_version.outputs.VERSION }}.
            
            Docker image details:
            - Registry: `ghcr.io/${{ github.repository }}/minibwa:${{ steps.get_version.outputs.VERSION }}`
            
            Singularity image attached below:
            - `minibwa.sif`
          files: |
            minibwa.sif
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
